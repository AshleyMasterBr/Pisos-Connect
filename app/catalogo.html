<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo — Pisos Connect</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0D0D1A">
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .filtros-bar { margin-bottom: 20px; }
        .btn-filtro { cursor: pointer; }

        /* Barra de busca no topo */
        .search-inline {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r-l);
            padding: 11px 16px;
            margin-bottom: 18px;
            transition: var(--tr);
        }
        .search-inline:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-dim);
        }
        .search-inline input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-1);
            font-size: 0.9rem;
            font-family: var(--font-body);
        }
        .search-inline input::placeholder { color: var(--text-3); }
        .search-inline .search-icon { color: var(--text-3); font-size: 1rem; }

        /* Contagem de resultados */
        .results-count {
            font-size: 0.78rem;
            color: var(--text-3);
            margin-bottom: 16px;
        }
        .results-count strong { color: var(--text-1); }
    </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
    <button class="header-back" onclick="history.back()">←</button>
    <div class="header-title">Catálogo de Pisos</div>
    <a href="../app/sacola.html" class="header-action">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="badge-count" id="sacolaBadge" style="display:none;">0</span>
    </a>
</header>

<main class="page">
    <div class="container">

        <!-- Busca -->
        <div class="search-inline">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" id="buscaInput" placeholder="Buscar por nome ou fornecedor..." oninput="filtrar()">
        </div>

        <!-- Filtros por tipo -->
        <div class="filtros-bar">
            <div style="display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none;">
                <button class="btn-filtro ativo" data-tipo="todos" onclick="setFiltro('todos', this)">Todos</button>
                <button class="btn-filtro" data-tipo="vinilico" onclick="setFiltro('vinilico', this)">Vinílico</button>
                <button class="btn-filtro" data-tipo="porcellanato" onclick="setFiltro('porcellanato', this)">Porcelanato</button>
                <button class="btn-filtro" data-tipo="laminado" onclick="setFiltro('laminado', this)">Laminado</button>
                <button class="btn-filtro" data-tipo="ceramico" onclick="setFiltro('ceramico', this)">Cerâmico</button>
            </div>
        </div>

        <!-- Contagem -->
        <div class="results-count" id="resultsCount"></div>

        <!-- Grid de Produtos -->
        <div class="produtos-grid" id="produtosGrid">
            <!-- Skeletons -->
            ${[1,2,3,4].map(() => `
            <div class="produto-card">
                <div class="produto-thumb skeleton"></div>
                <div class="produto-info">
                    <div class="skeleton" style="height:10px;margin-bottom:6px;border-radius:4px;"></div>
                    <div class="skeleton" style="height:13px;margin-bottom:8px;border-radius:4px;"></div>
                    <div class="skeleton" style="height:18px;width:60%;border-radius:4px;"></div>
                </div>
            </div>`).join('')}
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            </div>
            <h3>Nenhum produto encontrado</h3>
            <p>Tente outro filtro ou termo de busca.</p>
            <button class="btn btn-surface" onclick="limparFiltros()">Limpar filtros</button>
        </div>

    </div>
</main>

<!-- Bottom Nav SVG -->
<nav class="bottom-nav">
    <a href="../app/home.html" class="nav-item">
        <span class="nav-icon"><svg class="icon-home" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
        <span class="nav-label">Início</span>
    </a>
    <a href="../app/catalogo.html" class="nav-item ativo">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="7" height="7"/><rect x="15" y="3" width="7" height="7"/><rect x="15" y="15" width="7" height="7"/><rect x="2" y="15" width="7" height="7"/></svg></span>
        <span class="nav-label">Catálogo</span>
    </a>
    <a href="../app/profissionais.html" class="nav-item">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
        <span class="nav-label">Parceiros</span>
    </a>
    <a href="../app/sacola.html" class="nav-item">
        <span class="nav-icon" style="position:relative;"><svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></span>
        <span class="nav-label">Sacola</span>
    </a>
    <a href="../app/pedidos.html" class="nav-item">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span>
        <span class="nav-label">Pedidos</span>
    </a>
</nav>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script>
    const TIPO_LABEL = { vinilico:'Vinílico', porcellanato:'Porcelanato', laminado:'Laminado', ceramico:'Cerâmico' };
    const BG_MAP = {
        vinilico:'produto-thumb-bg-vinilico', porcellanato:'produto-thumb-bg-porcellanato',
        laminado:'produto-thumb-bg-laminado', ceramico:'produto-thumb-bg-ceramico'
    };

    let _todosOsProdutos = [];
    let _filtroTipo = 'todos';
    let _buscaTermo = '';

    document.addEventListener('DOMContentLoaded', async () => {
        await Auth.requireAuth();
        atualizarBadgeSacola();

        // Recupera filtro salvo da home
        const filtroSalvo = sessionStorage.getItem('filtroTipo');
        if (filtroSalvo && filtroSalvo !== 'todos') {
            _filtroTipo = filtroSalvo;
            document.querySelectorAll('[data-tipo]').forEach(btn => {
                btn.classList.toggle('ativo', btn.dataset.tipo === filtroSalvo);
            });
        }
        sessionStorage.removeItem('filtroTipo');

        await carregarProdutos();
    });

    async function carregarProdutos() {
        try {
            _todosOsProdutos = await DB.getProdutos();
            renderizar();
        } catch (e) {
            console.error(e);
            document.getElementById('produtosGrid').innerHTML = '<p style="color:var(--text-3);font-size:0.85rem;grid-column:1/-1;text-align:center;padding:40px;">Erro ao carregar produtos.</p>';
        }
    }

    function renderizar() {
        let lista = _todosOsProdutos;

        if (_filtroTipo !== 'todos') {
            lista = lista.filter(p => p.tipo === _filtroTipo);
        }
        if (_buscaTermo) {
            const t = _buscaTermo.toLowerCase();
            lista = lista.filter(p =>
                p.nome.toLowerCase().includes(t) ||
                (p.fornecedor || '').toLowerCase().includes(t)
            );
        }

        const grid = document.getElementById('produtosGrid');
        const empty = document.getElementById('emptyState');
        const count = document.getElementById('resultsCount');

        count.innerHTML = `<strong>${lista.length}</strong> produto${lista.length !== 1 ? 's' : ''} encontrado${lista.length !== 1 ? 's' : ''}`;

        if (!lista.length) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        grid.innerHTML = lista.map((p, i) => {
            const label = TIPO_LABEL[p.tipo] || p.tipo;
            return `
            <div class="produto-card" onclick="abrirProduto('${p.id}')" style="animation-delay:${i * 50}ms">
                <div class="produto-thumb ${BG_MAP[p.tipo] || ''}">
                    ${p.destaque ? '<span class="produto-badge badge-destaque">Destaque</span>' : ''}
                </div>
                <div class="produto-info">
                    <div class="produto-fornecedor">${p.fornecedor || ''}</div>
                    <div class="produto-nome">${p.nome}</div>
                    <div class="produto-preco">
                        R$ ${p.preco_m2.toFixed(2).replace('.',',')}
                        <span>/m²</span>
                    </div>
                    <div class="produto-m2">Caixa: ${p.m2_por_caixa} m²</div>
                </div>
            </div>`;
        }).join('');
    }

    function setFiltro(tipo, btn) {
        _filtroTipo = tipo;
        document.querySelectorAll('[data-tipo]').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        renderizar();
    }

    function filtrar() {
        _buscaTermo = document.getElementById('buscaInput').value;
        renderizar();
    }

    function limparFiltros() {
        _filtroTipo = 'todos';
        _buscaTermo = '';
        document.getElementById('buscaInput').value = '';
        document.querySelectorAll('[data-tipo]').forEach(b => b.classList.toggle('ativo', b.dataset.tipo === 'todos'));
        renderizar();
    }

    function abrirProduto(id) {
        sessionStorage.setItem('produtoId', id);
        window.location.href = '../app/produto.html';
    }

    function atualizarBadgeSacola() {
        const sacola = JSON.parse(sessionStorage.getItem('pisos_sacola') || '[]');
        const badge = document.getElementById('sacolaBadge');
        badge.style.display = sacola.length ? 'flex' : 'none';
        badge.textContent = sacola.length;
    }
</script>
</body>
</html>
