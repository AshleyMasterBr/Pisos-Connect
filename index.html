<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pisos Connect</title>
    <meta name="description" content="O iFood dos pisos. Calcule, escolha e receba em casa.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0D0D1A">
    <style>
        :root {
            --primary: #E94560;
            --bg: #0F0F1E;
        }
        body { 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            overflow: hidden;
            font-family: 'DM Sans', sans-serif;
        }
        .splash {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 24px;
            animation: fadeIn 0.8s ease-out;
        }
        .splash-logo {
            font-family: 'Syne', sans-serif; 
            font-size: 2.5rem; 
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -1px;
        }
        .splash-logo span { color: var(--primary); }
        .spinner {
            width: 40px; 
            height: 40px; 
            border: 3px solid rgba(233,69,96,0.1);
            border-top-color: var(--primary); 
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap');
    </style>
</head>
<body>
    <div class="splash">
        <div class="splash-logo">Pisos<span>Connect</span></div>
        <div class="spinner"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        // Router principal: redireciona baseado no estado de auth
        (async () => {
            try {
                const { data } = await DB.client.auth.getSession();
                const session = data?.session;

                if (!session) {
                    window.location.replace(CONFIG.rotas.login);
                    return;
                }

                const { data: perfil } = await DB.client
                    .from('perfis')
                    .select('role')
                    .eq('id', session.user.id)
                    .single();

                if (perfil?.role === 'admin') {
                    window.location.replace(CONFIG.rotas.admin);
                } else {
                    window.location.replace(CONFIG.rotas.home);
                }
            } catch (e) {
                console.error('Router error:', e);
                window.location.replace(CONFIG.rotas.login);
            }
        })();
    </script>
</body>
</html>
