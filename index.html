<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pisos Connect</title>
    <meta name="description" content="O iFood dos pisos. Calcule, escolha e receba em casa.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0D0D1A">
    <style>
        body { background: #0D0D1A; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .splash {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            font-family: 'DM Sans', sans-serif; color: #F0F0F8;
        }
        .splash-logo {
            font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800;
        }
        .splash-logo span { color: #E94560; }
        .spinner {
            width: 28px; height: 28px; border: 3px solid rgba(233,69,96,0.2);
            border-top-color: #E94560; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans&display=swap');
    </style>
</head>
<body>
    <div class="splash">
        <div class="splash-logo">Pisos<span>Connect</span></div>
        <div class="spinner"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        // Router principal: redireciona baseado no estado de auth
        (async () => {
            try {
                const { data } = await DB.client.auth.getSession();
                const session = data?.session;

                if (!session) {
                    window.location.replace(CONFIG.rotas.login);
                    return;
                }

                const { data: perfil } = await DB.client
                    .from('perfis')
                    .select('role')
                    .eq('id', session.user.id)
                    .single();

                if (perfil?.role === 'admin') {
                    window.location.replace(CONFIG.rotas.admin);
                } else {
                    window.location.replace(CONFIG.rotas.home);
                }
            } catch (e) {
                console.error('Router error:', e);
                window.location.replace(CONFIG.rotas.login);
            }
        })();
    </script>
</body>
</html>
