<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo — Pisos Connect Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="admin-sidebar">
    <div class="sidebar-brand">Pisos<span>Connect</span><div class="sidebar-brand-sub">Painel Admin</div></div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Principal</div>
        <a href="../admin/index.html" class="sidebar-link">
            <span class="link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg></span> Dashboard
        </a>
        <a href="../admin/pedidos.html" class="sidebar-link">
            <span class="link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span> Pedidos
        </a>
        <div class="nav-section-label" style="margin-top:8px;">Configuração</div>
        <a href="../admin/catalogo.html" class="sidebar-link ativo">
            <span class="link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="7" height="7"/><rect x="15" y="3" width="7" height="7"/><rect x="15" y="15" width="7" height="7"/><rect x="2" y="15" width="7" height="7"/></svg></span> Catálogo
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="sidebar-user">
            <div class="sidebar-user-avatar">A</div>
            <div>
                <div class="sidebar-user-nome" data-user-nome>Admin</div>
                <div class="sidebar-user-role">Administrador</div>
            </div>
        </div>
        <button class="sidebar-link" data-logout style="color:var(--primary);">
            <span class="link-icon">🚪</span> Sair
        </button>
    </div>
</aside>

<main class="admin-main">
    <div class="admin-topbar">
        <div class="topbar-title">Catálogo de Produtos</div>
        <div class="topbar-actions">
            <div class="admin-search">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="search" id="searchInput" placeholder="Buscar produto..." oninput="filtrarTabela()">
            </div>
            <button class="btn btn-primary" onclick="abrirModalNovo()">+ Novo Produto</button>
        </div>
    </div>

    <div class="admin-content">
        <div class="admin-table-wrap">
            <div class="table-header">
                <h3>Produtos cadastrados <span id="countProdutos" style="color:var(--text-3);font-weight:400;font-size:0.8rem;"></span></h3>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-surface btn-sm" onclick="importarCSV()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                        Importar CSV</button>
                    <input type="file" id="csvInput" accept=".csv" style="display:none;" onchange="processarCSV(this)">
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Preço/m²</th>
                        <th>Caixa(m²)</th>
                        <th>Fornecedor</th>
                        <th>Destaque</th>
                        <th>Ativo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoProdutos">
                    <tr><td colspan="9" style="text-align:center;color:var(--text-3);padding:32px;">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Modal Produto -->
<div class="modal-overlay" id="modalProduto">
    <div class="modal-box">
        <div class="modal-title">
            <span id="modalProdutoTitulo">Novo Produto</span>
            <button class="modal-close" onclick="fecharModal()">×</button>
        </div>
        <form id="formProduto" onsubmit="salvarProduto(event)">
            <input type="hidden" id="produtoId">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">SKU *</label>
                    <input type="text" class="form-control" id="fSku" placeholder="PV-001" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Tipo *</label>
                    <select class="form-control" id="fTipo" required>
                        <option value="">Selecione...</option>
                        <option value="vinilico">Vinílico</option>
                        <option value="porcellanato">Porcelanato</option>
                        <option value="laminado">Laminado</option>
                        <option value="ceramico">Cerâmico</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Nome do produto *</label>
                <input type="text" class="form-control" id="fNome" placeholder="Ex: Vinílico Premium Madeira Clara" required>
            </div>
            <div class="form-group">
                <label class="form-label">Descrição</label>
                <textarea class="form-control" id="fDescricao" rows="2" placeholder="Características, resistência, indicações de uso..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Preço / m² (R$) *</label>
                    <input type="number" class="form-control" id="fPrecoM2" placeholder="89.90" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">m² por caixa *</label>
                    <input type="number" class="form-control" id="fM2Caixa" placeholder="2.48" step="0.01" min="0.1" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Fornecedor</label>
                    <input type="text" class="form-control" id="fFornecedor" placeholder="Ex: Ruffino">
                </div>
                <div class="form-group">
                    <label class="form-label">Estoque (caixas)</label>
                    <input type="number" class="form-control" id="fEstoque" placeholder="0" min="0">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">URL da imagem</label>
                <input type="url" class="form-control" id="fImagem" placeholder="https://...">
            </div>
            <div style="display:flex;gap:24px;margin-bottom:20px;">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="fDestaque">
                        <span class="toggle-slider"></span>
                    </label>
                    <span style="font-size:0.85rem;">Destaque</span>
                </div>
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="fAtivo" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span style="font-size:0.85rem;">Ativo</span>
                </div>
            </div>
            <div style="display:flex;gap:10px;">
                <button type="submit" class="btn btn-primary btn-full" id="btnSalvarProduto">Salvar Produto</button>
                <button type="button" class="btn btn-surface" onclick="fecharModal()">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script>
    const TIPO_LABEL = { vinilico:'Vinílico', porcellanato:'Porcelanato', laminado:'Laminado', ceramico:'Cerâmico' };
    let _produtos = [];

    document.addEventListener('DOMContentLoaded', async () => {
        await Auth.requireAuth({ requireAdmin: true });
        Auth.preencherNomeUsuario();
        Auth.inicializarLogout();
        await carregarProdutos();
    });

    async function carregarProdutos() {
        // Admin vê todos (incluindo inativos)
        const { data } = await DB.client.from('produtos').select('*').order('tipo').order('nome');
        _produtos = data || [];
        renderizarTabela(_produtos);
    }

    function renderizarTabela(lista) {
        document.getElementById('countProdutos').textContent = `(${lista.length})`;
        const tbody = document.getElementById('corpoProdutos');
        if (!lista.length) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--text-3);padding:32px;">Nenhum produto cadastrado. Clique em "+ Novo Produto" para começar.</td></tr>';
            return;
        }
        tbody.innerHTML = lista.map(p => `
        <tr>
            <td style="font-family:monospace;color:var(--text-2);font-size:0.78rem;">${p.sku}</td>
            <td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.nome}</td>
            <td><span style="font-size:0.75rem;color:var(--text-2);">${TIPO_LABEL[p.tipo]||p.tipo}</span></td>
            <td style="color:var(--gold);font-weight:700;">R$ ${parseFloat(p.preco_m2).toFixed(2).replace('.',',')}</td>
            <td style="color:var(--text-2);">${p.m2_por_caixa} m²</td>
            <td style="color:var(--text-2);">${p.fornecedor||'—'}</td>
            <td style="text-align:center;">${p.destaque ? '<span style="color:var(--gold);font-size:0.9rem;">★</span>' : '<span style="color:var(--text-3);">—</span>'}</td>
            <td style="text-align:center;">${p.ativo ? '<span class="status-pill status-entregue" style="font-size:0.7rem;">Ativo</span>' : '<span class="status-pill status-cancelado" style="font-size:0.7rem;">Inativo</span>'}</td>
            <td>
                <div style="display:flex;gap:6px;">
                    <button class="btn btn-surface btn-sm" onclick="editarProduto('${p.id}')">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="toggleAtivo('${p.id}', ${p.ativo})" title="${p.ativo ? 'Desativar' : 'Ativar'}">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                    </button>
                </div>
            </td>
        </tr>`).join('');
    }

    function filtrarTabela() {
        const termo = document.getElementById('searchInput').value.toLowerCase();
        const filtrado = _produtos.filter(p =>
            p.nome.toLowerCase().includes(termo) ||
            (p.sku||'').toLowerCase().includes(termo) ||
            (p.fornecedor||'').toLowerCase().includes(termo)
        );
        renderizarTabela(filtrado);
    }

    function abrirModalNovo() {
        document.getElementById('modalProdutoTitulo').textContent = 'Novo Produto';
        document.getElementById('formProduto').reset();
        document.getElementById('produtoId').value = '';
        document.getElementById('fAtivo').checked = true;
        document.getElementById('modalProduto').classList.add('ativo');
    }

    function editarProduto(id) {
        const p = _produtos.find(x => x.id === id);
        if (!p) return;
        document.getElementById('modalProdutoTitulo').textContent = 'Editar Produto';
        document.getElementById('produtoId').value = p.id;
        document.getElementById('fSku').value = p.sku;
        document.getElementById('fNome').value = p.nome;
        document.getElementById('fTipo').value = p.tipo;
        document.getElementById('fDescricao').value = p.descricao || '';
        document.getElementById('fPrecoM2').value = p.preco_m2;
        document.getElementById('fM2Caixa').value = p.m2_por_caixa;
        document.getElementById('fFornecedor').value = p.fornecedor || '';
        document.getElementById('fEstoque').value = p.estoque_caixas || 0;
        document.getElementById('fImagem').value = p.imagem_url || '';
        document.getElementById('fDestaque').checked = p.destaque;
        document.getElementById('fAtivo').checked = p.ativo;
        document.getElementById('modalProduto').classList.add('ativo');
    }

    async function salvarProduto(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSalvarProduto');
        btn.disabled = true; btn.textContent = 'Salvando...';
        try {
            const id = document.getElementById('produtoId').value;
            const dados = {
                sku: document.getElementById('fSku').value,
                nome: document.getElementById('fNome').value,
                tipo: document.getElementById('fTipo').value,
                descricao: document.getElementById('fDescricao').value || null,
                preco_m2: parseFloat(document.getElementById('fPrecoM2').value),
                m2_por_caixa: parseFloat(document.getElementById('fM2Caixa').value),
                fornecedor: document.getElementById('fFornecedor').value || null,
                estoque_caixas: parseInt(document.getElementById('fEstoque').value) || 0,
                imagem_url: document.getElementById('fImagem').value || null,
                destaque: document.getElementById('fDestaque').checked,
                ativo: document.getElementById('fAtivo').checked
            };
            if (id) dados.id = id;
            await DB.upsertProduto(dados);
            toast(id ? 'Produto atualizado!' : 'Produto criado!', 'success');
            fecharModal();
            await carregarProdutos();
        } catch(err) {
            toast('Erro: ' + (err.message || 'Tente novamente.'), 'error');
        } finally {
            btn.disabled = false; btn.textContent = 'Salvar Produto';
        }
    }

    async function toggleAtivo(id, atualAtivo) {
        try {
            await DB.client.from('produtos').update({ ativo: !atualAtivo }).eq('id', id);
            toast(atualAtivo ? 'Produto desativado.' : 'Produto ativado!', 'info');
            await carregarProdutos();
        } catch(e) {
            toast('Erro ao atualizar.', 'error');
        }
    }

    function fecharModal() {
        document.getElementById('modalProduto').classList.remove('ativo');
    }

    // Import CSV — formato: sku,nome,tipo,preco_m2,m2_por_caixa,fornecedor
    function importarCSV() { document.getElementById('csvInput').click(); }

    async function processarCSV(input) {
        const file = input.files[0];
        if (!file) return;
        const text = await file.text();
        const linhas = text.trim().split('\n').slice(1); // pula header
        let ok = 0, err = 0;
        for (const linha of linhas) {
            const [sku, nome, tipo, preco_m2, m2_por_caixa, fornecedor] = linha.split(',').map(s => s.trim().replace(/"/g,''));
            if (!sku || !nome || !preco_m2) { err++; continue; }
            try {
                await DB.upsertProduto({ sku, nome, tipo, preco_m2: parseFloat(preco_m2), m2_por_caixa: parseFloat(m2_por_caixa), fornecedor: fornecedor||null, ativo:true });
                ok++;
            } catch { err++; }
        }
        toast(`CSV importado: ${ok} produto(s) OK, ${err} erro(s).`, ok > 0 ? 'success' : 'error');
        await carregarProdutos();
        input.value = '';
    }

    function toast(msg, tipo='info') {
        const c = document.getElementById('toastContainer');
        const el = document.createElement('div');
        el.className = `toast toast-${tipo}`;
        el.textContent = msg;
        c.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
</script>
</body>
</html>
